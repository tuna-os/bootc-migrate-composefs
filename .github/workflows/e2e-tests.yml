name: E2E Migration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: ${{ matrix.scenario.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - name: fedora-bootc self-migration
            base: "quay.io/fedora/fedora-bootc:44"
            target: "quay.io/fedora/fedora-bootc:44"
          - name: bluefin -> dakota
            base: "ghcr.io/projectbluefin/bluefin:stable"
            target: "ghcr.io/projectbluefin/dakota:stable"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf jq

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build Binary
        run: cargo build

      - name: Run E2E Test Suite
        env:
          BASE_IMAGE: ${{ matrix.scenario.base }}
          TARGET_IMAGE: ${{ matrix.scenario.target }}
        run: |
          # Run the test runner as root since loop mounts and podman --privileged are required
          sudo -E PATH=$PATH ./tests/run-e2e.sh
