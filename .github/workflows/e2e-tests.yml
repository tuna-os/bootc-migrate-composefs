name: E2E Migration Tests

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel superseded runs on the same ref so PR pushes don't queue up redundant jobs.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: ${{ matrix.scenario.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - name: bluefin -> dakota (systemd-boot + composefs)
            base: ghcr.io/projectbluefin/bluefin:stable
            target: ghcr.io/projectbluefin/dakota:stable
            # 20G intermittently ENOSPCs during the Phase-2 podman pull
            # (#42-class; last seen 2026-07-19) — match the other cells.
            disk_size: 40G
          - name: bluefin LTS -> dakota (systemd-boot + composefs)
            base: ghcr.io/projectbluefin/bluefin:lts
            target: ghcr.io/projectbluefin/dakota:stable
            filesystem: ext4
            # 20G default has intermittently ENOSPC'd (#42) — no XFS loopback
            # is involved here (ext4 natively supports fs-verity), so this is
            # just the outer disk being tight; match the LUKS scenario's 40G.
            disk_size: 40G
          - name: bluefin LTS -> dakota (LUKS + systemd-boot + composefs)
            base: ghcr.io/projectbluefin/bluefin:lts
            target: ghcr.io/projectbluefin/dakota:stable
            filesystem: xfs+crypt
            disk_size: 40G
          - name: bluefin LTS -> dakota (LVM-on-LUKS, separate /var + composefs)
            base: ghcr.io/projectbluefin/bluefin:lts
            target: ghcr.io/projectbluefin/dakota:stable
            filesystem: xfs+lvm+crypt
            # Was 40G — still ENOSPC'd during Phase-2 image pull twice (#42).
            # The BIOS-boot + ESP + separate /boot partitions and the fixed
            # 4G /var LV all come out of this before root sees any of it.
            disk_size: 60G
          - name: bluefin ostree re-base (OstreeDeploy)
            base: ghcr.io/projectbluefin/bluefin:stable
            # A distinct tag so the re-base is observable; gts is the
            # previous-Fedora Bluefin stream.
            target: ghcr.io/projectbluefin/bluefin:gts
            mode: ostree-rebase
            # bootc switch pulls the full target into ostree storage inside
            # the guest — needs headroom beyond the tracer's 20G.
            disk_size: 40G
          # fedora-bootc self-migration is the simpler sanity case; revisit once
          # the bluefin scenario is green end-to-end.
          # - name: fedora-bootc self-migration
          #   base: quay.io/fedora/fedora-bootc:44
          #   target: quay.io/fedora/fedora-bootc:44
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bluefin + Dakota are ~5 GB each. The default ubuntu-latest runner has
      # ~14 GB free; that plus a 20-60 GB disk.raw (a sparse file that grows
      # into real host disk as the guest writes to it), Rust target, and the
      # local registry can still blow the disk. Same action projectbluefin/
      # bluefin's own e2e uses (ublue-os/remove-unwanted-software).
      - name: Free disk space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            ovmf \
            podman \
            jq \
            iproute2 \
            netcat-openbsd \
            cryptsetup \
            lvm2 \
            xfsprogs \
            dosfstools \
            swtpm \
            swtpm-tools \

      # GitHub-hosted Linux runners expose /dev/kvm but the runner user isn't in
      # the kvm group by default. Make it world-accessible for this job so QEMU
      # can use KVM acceleration (TCG fallback is ~10x slower and would blow the
      # 45-minute job timeout).
      - name: Enable KVM access
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            ls -la /dev/kvm
            kvm-ok 2>/dev/null || true
          else
            echo "::warning::/dev/kvm not present; falling back to TCG emulation will be slow"
          fi

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build migration binary
        run: cargo build --release && cargo test --release

      # Pull the base image into local podman storage so the e2e script can
      # layer sshd onto it. The migration streams the target directly from
      # the upstream registry (RegistryEndpoint does the ghcr.io bearer-token
      # dance) — no local registry mirroring, which burned ~35 min / 12 GB
      # and timed the job out before the e2e ever ran.
      - name: Pull base + target images
        run: |
          set -eux
          sudo podman pull "${{ matrix.scenario.base }}"
          sudo podman pull "${{ matrix.scenario.target }}"
          echo "BASE_IMAGE=${{ matrix.scenario.base }}" >> "$GITHUB_ENV"
          echo "TARGET_IMAGE=${{ matrix.scenario.target }}" >> "$GITHUB_ENV"
          echo "FILESYSTEM=${{ matrix.scenario.filesystem || 'btrfs' }}" >> "$GITHUB_ENV"
          echo "DISK_SIZE=${{ matrix.scenario.disk_size || '20G' }}" >> "$GITHUB_ENV"
          echo "E2E_MODE=${{ matrix.scenario.mode || 'composefs-migrate' }}" >> "$GITHUB_ENV"

      - name: Disk space before E2E
        run: df -h /

      - name: Run E2E test suite
        id: e2e
        run: |
          # Run as root: loop mounts, podman --privileged, and OVMF VARS pflash
          # all need it. -E so BASE_IMAGE/TARGET_IMAGE flow through.
          set -o pipefail
          sudo -E PATH="$PATH" ./tests/run-e2e.sh 2>&1 | tee e2e-run.log

      - name: Disk space after E2E
        if: always()
        run: df -h /

      # Diagnosis starts from the job summary, not a 30 MB log download:
      # the last phase banner reached, every FAIL/ERROR assertion, and the
      # log tail land in $GITHUB_STEP_SUMMARY on failure.
      - name: Failure triage into job summary
        if: failure()
        run: |
          {
            echo "## E2E failure triage — ${{ matrix.scenario.name }}"
            if [ -f e2e-run.log ]; then
              echo '### Last phase reached'
              echo '```'
              grep -aE '^=== |\[e2e [0-9:]+\] ===' e2e-run.log | tail -5
              echo '```'
              echo '### Assertions and errors'
              echo '```'
              grep -aE 'FAIL:|ERROR:|Migration Failed|panicked' e2e-run.log | tail -20
              echo '```'
              echo '### Log tail'
              echo '```'
              tail -40 e2e-run.log
              echo '```'
            else
              echo 'e2e-run.log was never created — failure predates the harness.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ strategy.job-index }}
          path: |
            e2e-run.log
            qemu.log
            ovmf_vars.fd
          if-no-files-found: warn
          retention-days: 7
