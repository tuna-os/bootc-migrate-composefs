name: E2E Migration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e:
    name: ${{ matrix.scenario.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Cancel superseded runs on the same ref so PR pushes don't queue up.
    concurrency:
      group: e2e-${{ github.ref }}-${{ matrix.scenario.filesystem }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - name: bluefin -> dakota (btrfs + composefs)
            base: ghcr.io/projectbluefin/bluefin:stable
            target: ghcr.io/projectbluefin/dakota:stable
            filesystem: btrfs
          - name: bluefin:lts -> dakota (xfs + loopback)
            base: ghcr.io/projectbluefin/bluefin:lts
            target: ghcr.io/projectbluefin/dakota:stable
            filesystem: xfs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bluefin + Dakota are ~5 GB each. The default ubuntu-latest runner has
      # ~14 GB free; that plus a 20 GB disk.raw, Rust target, and the local
      # registry blows the disk. Reclaim ~30 GB by ditching Android/dotnet/etc.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            ovmf \
            podman \
            jq \
            iproute2 \
            netcat-openbsd

      # GitHub-hosted Linux runners expose /dev/kvm but the runner user isn't in
      # the kvm group by default. Make it world-accessible for this job so QEMU
      # can use KVM acceleration (TCG fallback is ~10x slower and would blow the
      # 45-minute job timeout).
      - name: Enable KVM access
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            ls -la /dev/kvm
            kvm-ok 2>/dev/null || true
          else
            echo "::warning::/dev/kvm not present; falling back to TCG emulation will be slow"
          fi

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # Export matrix-driven env vars. No local registry — CI runners have
      # fast internet and QEMU user-mode networking gives the VM direct
      # ghcr.io access. The e2e script pulls images on demand.
      - name: Export E2E env vars
        run: |
          echo "BASE_IMAGE=${{ matrix.scenario.base }}" >> "$GITHUB_ENV"
          echo "TARGET_IMAGE=${{ matrix.scenario.target }}" >> "$GITHUB_ENV"
          echo "FILESYSTEM=${{ matrix.scenario.filesystem }}" >> "$GITHUB_ENV"
          echo "SKIP_REGISTRY=true" >> "$GITHUB_ENV"

      - name: Disk space before E2E
        run: df -h /

      - name: Run E2E test suite
        id: e2e
        run: |
          # Run as root: loop mounts, podman --privileged, and OVMF VARS pflash
          # all need it. The matrix sets BASE_IMAGE / TARGET_IMAGE / FILESYSTEM
          # via GITHUB_ENV; just picks them up via env_var_or_default.
          set -o pipefail
          PROFILE_FLAG=--release just e2e 2>&1 | tee e2e-run.log

      - name: Disk space after E2E
        if: always()
        run: df -h /

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ strategy.job-index }}
          path: |
            e2e-run.log
            qemu.log
            ovmf_vars.fd
          if-no-files-found: warn
          retention-days: 7
