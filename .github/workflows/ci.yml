# Fast validation CI: linting, formatting, unit tests, and dependency policy.
#
# Following the bootc/composefs-rs convention, nearly everything here runs
# through `just` so it can be reproduced locally with a single command
# (`just check`). The heavier QEMU end-to-end matrix lives in e2e-tests.yml.
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Linting, formatting, and unit tests — everything `just check` runs.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - name: Run checks (clippy, rustfmt, unit tests, shellcheck)
        run: just check

  # Line-coverage regression floor. Report-first: the summary lands in the
  # job summary; the floor (see `just coverage-check`) only catches commits
  # that delete or bypass meaningful test coverage — it is NOT a target.
  # Raise the floor as milestones add tests; never lower it to merge.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage with regression floor
        run: |
          set -o pipefail
          cargo llvm-cov --workspace --all-features --summary-only \
            --fail-under-lines 26 | tee cov.txt
          {
            echo '## Line coverage'
            echo '```'
            tail -5 cov.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Workflow-file lint: catches broken expressions/needs/inputs in the CI
  # definitions themselves before they bite at dispatch time.
  actionlint:
    runs-on: ubuntu-latest
    # Style-level shellcheck findings stay advisory, matching the repo's
    # `shellcheck --severity=warning` convention (justfile lint-shell).
    env:
      SHELLCHECK_OPTS: --severity=warning
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  # Dependency license and source policy (deny.toml).
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check bans sources licenses

  # Sentinel job for branch protection — set this as the single required check.
  # Accepts 'skipped' so optional jobs never block a PR (e2e-gate skips on
  # non-pull_request events).
  #
  # e2e-gate MUST be in this list. Its absence let PR #73 auto-merge despite
  # a failing E2E cell: required-checks passed on validate+cargo-deny alone
  # while e2e-gate independently reported failure, and branch protection
  # only watches this sentinel. Never let required-checks and e2e-gate be
  # siblings again — required-checks is the merge gate, so every other gate
  # must feed into it.
  required-checks:
    if: always()
    needs: [validate, cargo-deny, coverage, actionlint, e2e-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          FAILED=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result | IN("success","skipped") | not) | .key')
          if [ -n "$FAILED" ]; then
            echo "The following jobs did not succeed: $FAILED"
            exit 1
          fi

  # Gate PRs on E2E passing. This job waits for the e2e-tests.yml workflow
  # (which runs in parallel) and blocks merge if any scenario failed.
  e2e-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Wait for E2E workflow
        uses: actions/github-script@v7
        with:
          script: |
            // Wait up to 50 minutes for the E2E workflow to complete
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;
            const maxWait = 50 * 60 * 1000;
            const start = Date.now();

            while (Date.now() - start < maxWait) {
              const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo,
                head_sha: sha,
                event: 'pull_request',
              });

              const e2eRun = runs.workflow_runs.find(r => r.name === 'E2E Migration Tests');
              if (e2eRun) {
                if (e2eRun.status === 'completed') {
                  if (e2eRun.conclusion === 'success') {
                    core.info(`E2E passed: ${e2eRun.html_url}`);
                    return;
                  } else {
                    core.setFailed(`E2E failed (${e2eRun.conclusion}): ${e2eRun.html_url}`);
                    return;
                  }
                }
                core.info(`E2E status: ${e2eRun.status}... waiting`);
              } else {
                core.info('E2E workflow not found yet, waiting...');
              }
              await new Promise(r => setTimeout(r, 30000));
            }
            core.setFailed('Timed out waiting for E2E workflow');
