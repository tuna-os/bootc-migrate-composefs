# Fast validation CI: linting, formatting, unit tests, and dependency policy.
#
# Following the bootc/composefs-rs convention, nearly everything here runs
# through `just` so it can be reproduced locally with a single command
# (`just check`). The heavier QEMU end-to-end matrix lives in e2e-tests.yml.
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Linting, formatting, and unit tests — everything `just check` runs.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - name: Run checks (clippy, rustfmt, unit tests, shellcheck)
        run: just check

  # Dependency license and source policy (deny.toml).
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check bans sources licenses

  # Sentinel job for branch protection — set this as the single required check.
  # Accepts 'skipped' so optional jobs never block a PR.
  required-checks:
    if: always()
    needs: [validate, cargo-deny]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          FAILED=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result | IN("success","skipped") | not) | .key')
          if [ -n "$FAILED" ]; then
            echo "The following jobs did not succeed: $FAILED"
            exit 1
          fi

  # Gate PRs on E2E passing. This job waits for the e2e-tests.yml workflow
  # (which runs in parallel) and blocks merge if any scenario failed.
  e2e-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Wait for E2E workflow
        uses: actions/github-script@v7
        with:
          script: |
            // Wait up to 50 minutes for the E2E workflow to complete
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;
            const maxWait = 50 * 60 * 1000;
            const start = Date.now();

            while (Date.now() - start < maxWait) {
              const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo,
                head_sha: sha,
                event: 'pull_request',
              });

              const e2eRun = runs.workflow_runs.find(r => r.name === 'E2E Migration Tests');
              if (e2eRun) {
                if (e2eRun.status === 'completed') {
                  if (e2eRun.conclusion === 'success') {
                    core.info(`E2E passed: ${e2eRun.html_url}`);
                    return;
                  } else {
                    core.setFailed(`E2E failed (${e2eRun.conclusion}): ${e2eRun.html_url}`);
                    return;
                  }
                }
                core.info(`E2E status: ${e2eRun.status}... waiting`);
              } else {
                core.info('E2E workflow not found yet, waiting...');
              }
              await new Promise(r => setTimeout(r, 30000));
            }
            core.setFailed('Timed out waiting for E2E workflow');
