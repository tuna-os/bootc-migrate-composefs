# Fast validation CI: linting, formatting, unit tests, and dependency policy.
#
# Following the bootc/composefs-rs convention, nearly everything here runs
# through `just` so it can be reproduced locally with a single command
# (`just check`). The heavier QEMU end-to-end matrix lives in e2e-tests.yml.
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Linting, formatting, and unit tests — everything `just check` runs.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v2
      - name: Run checks (clippy, rustfmt, unit tests, shellcheck)
        run: just check

  # Dependency license and source policy (deny.toml).
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check bans sources licenses

  # Sentinel job for branch protection — set this as the single required check.
  # Accepts 'skipped' so optional jobs never block a PR.
  required-checks:
    if: always()
    needs: [validate, cargo-deny]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          FAILED=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result | IN("success","skipped") | not) | .key')
          if [ -n "$FAILED" ]; then
            echo "The following jobs did not succeed: $FAILED"
            exit 1
          fi
